{% extends "base.html" %}

{% block title %}管理员登录{% endblock %}

{% block content %}
<section class="panel narrow-panel">
  <div class="panel-head">
    <div>
      <p class="eyebrow">Admin Access</p>
      <h3>管理后台登录</h3>
      <p class="muted">输入管理员密码后进入审核、入库和出库页面。</p>
    </div>
  </div>
  <form action="{{ url_for('admin_login') }}" method="post" class="login-form">
    <label>
      <span>管理员密码</span>
      <input type="password" name="password" required>
    </label>
    <div class="action-row">
      <button class="primary-btn" type="submit">进入管理后台</button>
    </div>
  </form>
</section>
{% endblock %}
